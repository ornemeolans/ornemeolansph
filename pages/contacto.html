<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ornella Meolans | Contacto</title>
    
    <meta name="description" content="Contacto con Ornella Meolans Fotografía. Reserva tu sesión fotográfica en Córdoba. Consulta por books, cursos y sesiones.">
    <meta name="keywords" content="contacto, fotografía, Córdoba, reservar sesión, Ornella Meolans">
    
    <meta property="og:title" content="Ornella Meolans | Contacto">
    <meta property="og:description" content="Reserve su sesión fotográfica profesional. Books, cursos y más.">
    <meta property="og:image" content="https://ornemeolans.github.io/ornemeolansph/assets/img/logo.png">
    <meta property="og:url" content="https://ornemeolans.github.io/ornemeolansph/pages/contacto.html">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="es_AR">
    
    <link rel="stylesheet" href="https://use.typekit.net/uex0fps.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body class="bg-pattern">
    <header class="fixed-top">
        <nav class="navbar navbar-expand-lg navbar-light">
            <div class="container">
                <a class="navbar-brand" href="../index.html"><img src="../assets/img/logo.png" alt="Logo" class="logo-nav"></a>
                <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navOrne">
                    <span>MENU</span>
                </button>
                <div class="collapse navbar-collapse" id="navOrne">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="../index.html">INICIO</a></li>
                        <li class="nav-item"><a class="nav-link" href="cursos.html">CURSOS</a></li>
                        <li class="nav-item"><a class="nav-link" href="sesiones.html">SESIONES</a></li>
                        <li class="nav-item"><a class="nav-link" href="mi-historia.html">MI HISTORIA</a></li>
                        <li class="nav-item"><a class="nav-link active" href="contacto.html">CONTACTO</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <section class="pages-hero">
        <div class="container text-center" data-aos="fade-down">
            <h1 class="section-title">HABLEMOS</h1>
            <p class="section-subtitle">Déjame tu mensaje y te responderé a la brevedad.</p>
        </div>
    </section>

    <main class="container contact-main-layout pb-5">
        <div class="contact-column-left" data-aos="fade-right">
            <div class="glass-card">
                <form action="https://formspree.io/f/mjgavjqq" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" name="name" class="form-control aesthetic-input" placeholder="Tu nombre" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control aesthetic-input" placeholder="hola@ejemplo.com" required>
                    </div>
                    
                    <div class="session-checklist">
                        <label class="form-label"><strong>¿Qué tipo de sesión te interesa?</strong></label>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="session_type" value="books_personales" id="session1">
                            <label class="form-check-label" for="session1">Books Personales</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="session_type" value="books_infantiles" id="session2">
                            <label class="form-check-label" for="session2">Books Infantiles</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="session_type" value="quinceañeras" id="session3">
                            <label class="form-check-label" for="session3">Quinceañeras</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="session_type" value="preboda" id="session4">
                            <label class="form-check-label" for="session4">Preboda</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="session_type" value="embarazadas" id="session5">
                            <label class="form-check-label" for="session5">Embarazadas</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="session_type" value="marca_personal" id="session6">
                            <label class="form-check-label" for="session6">Marca Personal</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="session_type" value="producto" id="session7">
                            <label class="form-check-label" for="session7">Fotografía de Producto</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="session_type" value="cursos" id="session8">
                            <label class="form-check-label" for="session8">Cursos</label>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Mensaje</label>
                        <textarea name="message" class="form-control aesthetic-input" rows="4" placeholder="Cuéntame más sobre lo que necesitas..." required></textarea>
                    </div>
                    <button type="submit" class="btn-submit">ENVIAR MENSAJE</button>
                </form>
            </div>
        </div>
        
        <div class="contact-column-right" data-aos="fade-left">
            <div class="glass-card">
                <h3 class="item-title">CONTACTO</h3>
                <a href="mailto:ornemeolansph@gmail.com" class="contact-link" rel="noopener">
                    <img src="../assets/img/gmail.png" alt="Email"> ornemeolansph@gmail.com
                </a>
                <a href="https://walink.co/fa4733" class="contact-link" target="_blank" rel="noopener">
                    <img src="../assets/img/whatsapp.png" alt="WhatsApp"> WhatsApp
                </a>
                <a href="https://msng.link/o/?ornemeolans=tg" class="contact-link" target="_blank" rel="noopener">
                    <img src="../assets/img/telegram.png" alt="Telegram"> Telegram
                </a>
            </div>
        </div>
    </main>

    <footer>
        <div class="container text-center">
            <div class="social-links mb-3">
                <a href="https://www.instagram.com/ornemeolansph/" target="_blank" rel="noopener"><img src="../assets/img/instagram.png" alt="Instagram"></a>
                <a href="https://www.facebook.com/ornellameolansfotografia" target="_blank" rel="noopener"><img src="../assets/img/facebook.png" alt="Facebook"></a>
            </div>
            <p>© 2026 Ornella Meolans Fotografía</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init();</script>
</body>
</html>
